  <body>
    <header>
      <h1>Course Organizer</h1>

    <!-- nav -->

    <div>
      <section>
        <h1>Contact Us</h1>
      </section>
      <form>
        <section>
          <label>NAME</label><br />
          <input
            type="text"
            placeholder="Your Name"
            required
            autofocus
          /><br /><br />
          <label>EMAIL ADDRESS</label><br />
          <input
            type="text"
            placeholder="Your Email Address"
            required
          /><br /><br />
          <label>YOUR MESSAGE</label><br />
          <textarea
            name="message"
            placeholder="Enter Your Message"
            readonly
            rows="4"
            required
          ></textarea>
        </section>
        <input type="submit" value="CONTACT" class="sub" />
      </form>
    </div>

    </footer>
